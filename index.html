<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web App</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        /* Navbar */
        .navbar {
            background: #333;
            color: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 20px;
        }

        .menu {
            display: flex;
            gap: 15px;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        /* Card */
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Form */
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        /* Output */
        #output {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .menu {
                flex-direction: column;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>My Web App</h1>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <h2>User Input Form</h2>

            <input type="text" id="name" placeholder="Enter your name">
            <button onclick="showMessage()">Submit</button>

            <div id="output"></div>
        </div>
    </div>

    <script>
        function showMessage() {
            let name = document.getElementById("name").value;

            if (name === "") {
                document.getElementById("output").innerText = "Please enter your name!";
                document.getElementById("output").style.color = "red";
            } else {
                document.getElementById("output").innerText = "Hello, " + name + "!";
                document.getElementById("output").style.color = "green";
            }
        }
    </script>

</body>
</html>
